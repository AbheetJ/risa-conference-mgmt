<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RISA Labs — Conference Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f5f5f7;
      --card:     #ffffff;
      --border:   #e5e5ea;
      --border2:  #d1d5db;
      --shadow:   0 1px 4px rgba(0,0,0,0.07), 0 0 0 1px rgba(0,0,0,0.04);
      --text:     #1a1a1a;
      --text2:    #6b7280;
      --text3:    #9ca3af;
      --blue:     #4f86f7;
      --blue-bg:  #eff6ff;
      --blue-mid: #dbeafe;
      --green:    #059669;
      --green-bg: #d1fae5;
      --red:      #dc2626;
      --red-bg:   #fee2e2;
      --gray-bg:  #f3f4f6;
      --yellow:   #d97706;
      --yellow-bg:#fef3c7;
      --purple:   #7c3aed;
      --purple-bg:#f5f3ff;
      --purple-mid:#ede9fe;
      --teal:     #0d9488;
      --teal-bg:  #f0fdfa;
      --teal-mid: #ccfbf1;
      --orange:   #ea580c;
      --orange-bg:#fff7ed;
      --orange-mid:#fed7aa;
      --pink:     #db2777;
      --pink-bg:  #fdf2f8;
      --pink-mid: #fce7f3;
      --sw:       240px;
      --radius:   14px;
    }

    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      overflow: hidden;
      height: 100vh;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* ── SIDEBAR ──────────────────────────────── */
    .sidebar {
      width: var(--sw);
      min-width: var(--sw);
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow-y: auto;
    }

    .sb-brand {
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      border-top: 3px solid var(--blue);
    }

    .sb-icon {
      width: 32px; height: 32px;
      background: var(--blue);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .sb-icon svg { width: 18px; height: 18px; color: white; }

    .sb-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.2;
    }
    .sb-tagline { font-size: 11px; color: var(--text3); margin-top: 1px; }

    .sb-section {
      padding: 14px 16px 6px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text3);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .ci {
      padding: 8px 12px;
      margin: 1px 6px;
      border-radius: 8px;
      cursor: pointer;
      transition: background .12s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ci:hover { background: var(--bg); }
    .ci.active { background: var(--blue-bg); }
    .ci.active .ci-name { color: var(--blue); font-weight: 600; }

    .ci-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--border2);
    }
    .ci-dot.active { background: var(--blue); box-shadow: 0 0 0 2px rgba(79,134,247,0.2); }
    .ci-dot.completed { background: var(--green); }

    .ci-body { flex: 1; min-width: 0; }
    .ci-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ci-prog-row { display: flex; align-items: center; gap: 5px; margin-top: 3px; }
    .ci-bar { flex: 1; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
    .ci-fill { height: 100%; background: var(--blue); border-radius: 1px; transition: width .3s; }
    .ci-num { font-size: 10px; color: var(--text3); }

    .sb-footer { padding: 10px; margin-top: auto; border-top: 1px solid var(--border); }
    .sb-add {
      width: 100%;
      padding: 8px;
      background: transparent;
      border: 1px dashed var(--border2);
      border-radius: 8px;
      color: var(--text3);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
    }
    .sb-add:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-bg); }

    .sb-nav-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      margin: 4px 6px 0;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--text2);
      transition: background .12s, color .12s;
    }
    .sb-nav-item:hover { background: var(--bg); color: var(--text); }
    .sb-nav-item.active { background: var(--blue-bg); color: var(--blue); font-weight: 600; }
    .sb-nav-item svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* ── SUMMARY VIEW ────────────────────────── */
    .summ-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 14px;
    }
    .sc {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      cursor: pointer;
      transition: box-shadow .15s, transform .15s;
    }
    .sc:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.10); transform: translateY(-1px); }
    .sc-body { padding: 18px 20px 14px; flex: 1; }
    .sc-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 4px; }
    .sc-name { font-size: 17px; font-weight: 700; color: var(--text); }
    .sc-top-right { display: flex; align-items: center; gap: 8px; }
    .sc-arrow { font-size: 15px; color: var(--text3); }
    .sc-meta { font-size: 12px; color: var(--text2); margin-bottom: 3px; }
    .sc-venue { font-size: 12px; color: var(--text3); margin-bottom: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sc-desc {
      font-size: 12px;
      color: var(--text2);
      line-height: 1.6;
      margin-bottom: 14px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .sc-stats { display: flex; gap: 0; margin-bottom: 14px; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .sc-stat { flex: 1; padding: 8px 12px; text-align: center; border-right: 1px solid var(--border); }
    .sc-stat:last-child { border-right: none; }
    .sc-stat-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 2px; }
    .sc-stat-val { font-size: 13px; font-weight: 600; color: var(--text); }
    .sc-phases { display: flex; flex-direction: column; gap: 6px; }
    .sc-phase { display: flex; align-items: center; gap: 8px; }
    .sc-phase-lbl { font-size: 11px; color: var(--text3); width: 90px; flex-shrink: 0; }
    .sc-phase-bar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .sc-phase-fill { height: 100%; background: var(--blue); border-radius: 2px; transition: width .3s; }
    .sc-phase-fill.done { background: var(--green); }
    .sc-phase-pct { font-size: 10px; color: var(--text3); width: 28px; text-align: right; flex-shrink: 0; }
    .sc-footer {
      padding: 10px 20px;
      background: var(--blue-bg);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sc-footer-lbl { font-size: 11px; color: var(--text2); }
    .sc-footer-val { font-size: 12px; font-weight: 600; color: var(--blue); }

    /* ── MAIN ─────────────────────────────────── */
    .main { flex: 1; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; }

    /* ── PAGE HEADER ─────────────────────────── */
    .page-hdr {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 20px 28px 18px;
    }

    .page-hdr-inner { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }

    .page-hdr-left { display: flex; align-items: center; gap: 14px; }

    .page-icon {
      width: 44px; height: 44px;
      background: var(--blue);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .page-icon svg { width: 24px; height: 24px; color: white; }

    .page-title { font-size: 24px; font-weight: 700; color: var(--text); line-height: 1.2; }
    .page-subtitle { font-size: 13px; color: var(--text2); margin-top: 3px; }

    .page-hdr-right { display: flex; align-items: center; gap: 8px; padding-top: 4px; }

    /* ── SEARCH BAR ─────────────────────────── */
    .search-row {
      padding: 14px 28px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 10px;
    }

    .search-wrap {
      flex: 1;
      position: relative;
    }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text3);
      width: 16px; height: 16px;
    }
    .search-input {
      width: 100%;
      padding: 10px 14px 10px 40px;
      border: 1px solid var(--border);
      border-radius: 50px;
      background: var(--bg);
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
    }
    .search-input:focus { outline: none; border-color: var(--blue); background: var(--card); box-shadow: 0 0 0 3px rgba(79,134,247,0.1); }
    .search-input::placeholder { color: var(--text3); }

    .filter-btn {
      padding: 10px 16px;
      border: 1px solid var(--border);
      border-radius: 50px;
      background: var(--card);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--text2);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all .15s;
      white-space: nowrap;
    }
    .filter-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-bg); }

    /* ── CONTENT ──────────────────────────────── */
    .content { padding: 20px 28px; flex: 1; }

    /* ── BUTTONS ──────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-blue { background: var(--blue); color: white; }
    .btn-blue:hover { background: #3a73e8; }
    .btn-outline { background: var(--card); color: var(--text); border: 1px solid var(--border); }
    .btn-outline:hover { border-color: var(--border2); background: var(--bg); }
    .btn-blue-outline { background: var(--card); color: var(--blue); border: 1px solid var(--blue); }
    .btn-blue-outline:hover { background: var(--blue-bg); }
    .btn-ghost { background: transparent; color: var(--text2); }
    .btn-ghost:hover { background: var(--bg); color: var(--text); }
    .btn-red { background: transparent; color: var(--red); border: 1px solid rgba(220,38,38,.2); }
    .btn-red:hover { background: var(--red-bg); }

    /* ── BADGES / PILLS ──────────────────────── */
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
    }
    .pill-blue     { background: var(--blue-mid); color: var(--blue); }
    .pill-green    { background: var(--green-bg); color: var(--green); }
    .pill-red      { background: var(--red-bg);   color: var(--red);   }
    .pill-gray     { background: var(--gray-bg);  color: var(--text2); }
    .pill-yellow   { background: var(--yellow-bg);color: var(--yellow);}

    .vtag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      background: var(--gray-bg);
      color: var(--text3);
    }

    /* ── STAT CARDS ──────────────────────────── */
    .stat-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 20px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow); }
    .stat-lbl { font-size: 12px; color: var(--text3); font-weight: 500; }
    .stat-val { font-size: 28px; font-weight: 700; color: var(--text); margin-top: 4px; line-height: 1; }
    .stat-val span { font-size: 14px; font-weight: 400; color: var(--text3); }
    .stat-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }

    /* ── CONFERENCE CARDS GRID ───────────────── */
    .conf-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; }

    .cc {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: box-shadow .15s, transform .15s;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .cc:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1), 0 0 0 1px rgba(79,134,247,0.2); transform: translateY(-1px); }

    .cc-body { padding: 18px 20px; flex: 1; }

    .cc-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 4px; }
    .cc-name { font-size: 17px; font-weight: 600; color: var(--text); }
    .cc-arrow { color: var(--text3); font-size: 16px; margin-top: 2px; flex-shrink: 0; }

    .cc-meta { font-size: 12px; color: var(--text3); margin-bottom: 14px; }

    .cc-row { display: flex; gap: 24px; margin-bottom: 12px; }
    .cc-field { }
    .cc-field-lbl { font-size: 11px; color: var(--text3); margin-bottom: 2px; }
    .cc-field-val { font-size: 14px; font-weight: 500; color: var(--text); }

    .cc-divider { height: 1px; background: var(--border); margin: 12px 0; }

    .cc-footer {
      background: var(--blue-bg);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid #dbeafe;
    }
    .cc-footer-lbl { font-size: 13px; color: var(--blue); font-weight: 500; }
    .cc-footer-val { font-size: 13px; font-weight: 600; color: var(--text); }

    .cc-progress-lbl { font-size: 12px; color: var(--text3); margin-bottom: 6px; display: flex; justify-content: space-between; }
    .cc-pbar { height: 4px; background: var(--bg); border-radius: 2px; overflow: hidden; margin-bottom: 14px; }
    .cc-pfill { height: 100%; background: var(--blue); border-radius: 2px; transition: width .3s; }

    .cc-add {
      background: var(--card);
      border: 1.5px dashed var(--border2);
      border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 6px;
      min-height: 160px;
      cursor: pointer;
      color: var(--text3);
      font-size: 13px;
      font-weight: 500;
      transition: all .15s;
    }
    .cc-add:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-bg); }
    .cc-add-plus { font-size: 24px; font-weight: 300; line-height: 1; }

    /* ── CONF DETAIL HEADER ──────────────────── */
    .detail-hdr {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 18px 28px 14px;
    }
    .detail-hdr-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
    .detail-hdr-name { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .detail-hdr-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .detail-hdr-txt { font-size: 12px; color: var(--text3); }

    .detail-pct { text-align: right; }
    .detail-pct-num { font-size: 24px; font-weight: 700; color: var(--blue); }
    .detail-pct-sub { font-size: 11px; color: var(--text3); }
    .detail-pct-bar { width: 80px; height: 4px; background: var(--border); border-radius: 2px; margin-top: 6px; margin-left: auto; overflow: hidden; }
    .detail-pct-fill { height: 100%; background: var(--blue); border-radius: 2px; }

    .fetch-row { display: flex; gap: 8px; align-items: center; }
    .fetch-input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      color: var(--text);
      background: var(--bg);
    }
    .fetch-input:focus { outline: none; border-color: var(--blue); background: var(--card); }
    .fetch-input::placeholder { color: var(--text3); }
    .fetch-lbl { font-size: 12px; color: var(--text3); white-space: nowrap; }

    /* ── TABS ─────────────────────────────────── */
    .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); background: var(--card); padding: 0 28px; }
    .tab {
      padding: 11px 14px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text3);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color .15s;
    }
    .tab:hover { color: var(--text2); }
    .tab.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 600; }

    /* ── TASK SECTIONS ───────────────────────── */
    .task-sec {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 10px;
      box-shadow: var(--shadow);
    }

    .ts-hdr {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 18px;
      cursor: pointer;
      user-select: none;
      transition: background .1s;
    }
    .ts-hdr:hover { background: var(--bg); }

    .ts-icon { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .ts-title { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; }

    .ts-pill { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; background: var(--gray-bg); color: var(--text3); }
    .ts-arrow { font-size: 10px; color: var(--text3); transition: transform .2s; }

    .task-sec.collapsed .ts-arrow { transform: rotate(-90deg); }
    .task-sec.collapsed .ts-body { display: none; }
    .ts-body { border-top: 1px solid var(--border); }

    /* ── DRAG REORDER ────────────────────────── */
    .ti-drag { cursor: grab; color: var(--text3); font-size: 14px; flex-shrink: 0; margin-top: 1px; opacity: 0; transition: opacity .15s; user-select: none; padding: 0 2px; }
    .ti:hover .ti-drag { opacity: 1; }
    .ti.dragging { opacity: 0.4; }
    .ti.drag-over { border-top: 2px solid var(--blue); }

    /* ── TASK ACTIONS ────────────────────────── */
    .ti-actions { display: flex; gap: 4px; flex-shrink: 0; opacity: 0; transition: opacity .15s; margin-top: 2px; }
    .ti:hover .ti-actions { opacity: 1; }
    .ti-act-btn { background: none; border: 1px solid var(--border); border-radius: 5px; cursor: pointer; font-size: 11px; padding: 2px 6px; color: var(--text3); line-height: 1.4; }
    .ti-act-btn:hover { background: var(--gray-bg); color: var(--text); }
    .ti-act-btn.del:hover { background: #fee2e2; color: #dc2626; border-color: #fca5a5; }
    .ts-add-row { padding: 10px 18px; border-top: 1px dashed var(--border); }
    .ts-add-btn { background: none; border: 1px dashed var(--border2); border-radius: 7px; color: var(--text3); font-size: 12px; padding: 6px 14px; cursor: pointer; width: 100%; text-align: left; }
    .ts-add-btn:hover { background: var(--blue-tint); color: var(--blue); border-color: var(--blue); }

    /* ── TASK ITEMS ──────────────────────────── */
    .ti {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      transition: background .1s;
    }
    .ti:last-child { border-bottom: none; }
    .ti:hover { background: #fafafa; }

    .ti-cb {
      width: 16px; height: 16px;
      border: 1.5px solid var(--border2);
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 2px;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .ti-cb.done { background: var(--blue); border-color: var(--blue); }
    .ti-cb.done::after { content: '✓'; color: white; font-size: 10px; font-weight: 700; }

    .ti-body { flex: 1; min-width: 0; }
    .ti-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 5px; }
    .ti-title.struck { text-decoration: line-through; color: var(--text3); }

      border-radius: 6px;

      font-size: 11px;
      font-weight: 500;
      color: var(--text2);
      background: var(--bg);
      cursor: pointer;
    }
    .sel:focus { outline: none; border-color: var(--blue); }

    .ov-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .ov-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow); }

// ── AUTH STATE LISTENER ─────────────────────────
AUTH.onAuthStateChanged(user => {
  const screen = document.getElementById('auth-screen');
  if (!user) {
    // Not logged in — show login screen
    if (screen) screen.style.display = 'flex';
    document.getElementById('user-profile').innerHTML = '';
    return;
  }
  // Wrong domain — kick out immediately
  if (!user.email.endsWith('@' + ALLOWED_DOMAIN)) {
    AUTH.signOut();
    showAuthError('Access restricted to @' + ALLOWED_DOMAIN + ' accounts.');
    return;
  }
  // Valid user — hide login, show app
  if (screen) screen.style.display = 'none';
  setUserProfile(user);
  if (!_dbReady) load();
});

let _saveTimer   = null;
let _lastWriteTs = 0;
let _dbReady     = false;

// Only sync data — navigation state (active/tab/page/search) stays local
function save() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => {
    _lastWriteTs = Date.now();
    DB.set({ confs: S.confs, tasks: S.tasks, members: S.members, _ts: _lastWriteTs })
      .catch(() => toast('Save failed — check connection', 'err'));
  }, 400);
}

function _applyDefaults() {
  S.confs.forEach(c => { if (!S.tasks[c.id]) S.tasks[c.id]={}; if (!c.team) c.team=[]; });
  DEFAULT_CONFS.forEach(d => {
    const ex = S.confs.find(c => c.id===d.id);
    if (ex) ['url','dates','venue','description','audienceCount','icpCount'].forEach(f => {
      if (d[f]) ex[f] = d[f];
    });
  });
  S.confs.forEach(c => seedDbTasks(c));
}

function _render() {
  renderSidebar();
  if (S.active && conf(S.active)) renderDetail();
  else if (S.page==='summary') showSummary();
  else if (S.page==='mytasks') showMyTasks();
  else dashboard();
}

function load() {
  // Show loading screen
  document.getElementById('main-content').innerHTML =
    `<div style="padding:60px;text-align:center;color:var(--text3)">
       <div style="font-size:28px;margin-bottom:10px">⏳</div>
       <div style="font-size:15px;font-weight:500">Connecting to database…</div>
     </div>`;

  let firstLoad = true;

  DB.on('value', snap => {
    const data = snap.val();

    if (firstLoad) {
      firstLoad = false;
      if (data && data.confs && data.confs.length) {
        S.confs   = data.confs;
        S.tasks   = data.tasks   || {};
        S.members = normMembers(data.members);
      } else {
        // First ever load — seed defaults and write to Firebase
        S.confs = DEFAULT_CONFS.map(blank);
        _applyDefaults();
        save();
      }
      _applyDefaults();
      _dbReady = true;
      const el = document.getElementById('sync-status');
      if (el) el.innerHTML = '🟢 Live sync on';
      _render();
      return;
    }

    // ── Remote update from a teammate ──
    if (!_dbReady || !data) return;
    // Ignore our own writes (echoed back within 2 s)
    if (data._ts && Math.abs(data._ts - _lastWriteTs) < 2000) return;

    S.confs   = data.confs   || S.confs;
    S.tasks   = data.tasks   || S.tasks;
    S.members = normMembers(data.members || S.members);
    _applyDefaults();

    // Re-render sidebar always; re-render main only if not actively typing
    renderSidebar();
    const active = document.activeElement;
    const typing = active && (active.tagName==='INPUT' || active.tagName==='TEXTAREA');
    if (!typing) {
      if (S.active && conf(S.active)) renderDetail();
      else if (S.page==='summary') showSummary();
      else if (S.page==='mytasks') showMyTasks();
      else dashboard();
    }
    toast('🔄 Synced — a teammate made changes', 'ok');
  }, err => {
    toast('Database connection failed', 'err');
    // Fallback to empty defaults so app still opens
    S.confs = DEFAULT_CONFS.map(blank);
    _applyDefaults();
    _render();
  });
}

function blank(d) {
  return { url:'', dates:'', venue:'', description:'', audienceCount:'', icpCount:'', notes:'', team:[], ...d };
}

// Pre-fill databasing task values from known conference data (never overwrites user-entered data)
function seedDbTasks(c) {
  if (!S.tasks[c.id]) S.tasks[c.id] = {};
  if (!S.tasks[c.id].databasing) S.tasks[c.id].databasing = {};
  const db = S.tasks[c.id].databasing;
  const fill = (tid, val) => {
    if (!val) return;
    // always sync seeded fields so stale cached values are replaced
    db[tid] = { checked: false, owner: 'Unassigned', status: 'todo', ...(db[tid] || {}), value: val };
  };
  fill('db_about',    c.description);
  fill('db_venue',    c.venue);
  fill('db_dates',    c.dates);
  fill('db_audience', c.audienceCount);
  fill('db_icp',      c.icpCount);
  fill('db_prosp',    c.url);
}

function conf(id) { return S.confs.find(c=>c.id===id); }

function tget(cid,sec,tid) {
  return S.tasks[cid]?.[sec]?.[tid] || {checked:false,owner:'Unassigned',value:'',status:'todo'};
}
function tset(cid,sec,tid,up) {
  if (!S.tasks[cid]) S.tasks[cid]={};
  if (!S.tasks[cid][sec]) S.tasks[cid][sec]={};
  S.tasks[cid][sec][tid] = {...(S.tasks[cid][sec][tid]||{checked:false,owner:'Unassigned',value:'',status:'todo'}),...up};
  save();
}

function prog(cid) {
  let t=0,d=0;
  Object.values(SEC).forEach(s=>{
    const hidden=S.tasks[cid]?.[s.key]?._hidden||[];
    const custom=S.tasks[cid]?.[s.key]?._custom||[];
    s.tasks.filter(tk=>!hidden.includes(tk.id)).forEach(tk=>{t++;if(tget(cid,s.key,tk.id).checked)d++;});
    custom.forEach(tk=>{t++;if(tget(cid,s.key,tk.id).checked)d++;});
  });
  return {t,d,pct:t>0?Math.round(d/t*100):0};
}
function sprog(cid,key) {
  const s=SEC[key];
  const hidden=S.tasks[cid]?.[key]?._hidden||[];
  const custom=S.tasks[cid]?.[key]?._custom||[];
  const activeTasks=[...s.tasks.filter(tk=>!hidden.includes(tk.id)),...custom];
  let d=0;
  activeTasks.forEach(tk=>{if(tget(cid,key,tk.id).checked)d++;});
  return {t:activeTasks.length,d,pct:activeTasks.length>0?Math.round(d/activeTasks.length*100):0};
}

function pctFill(pct) {
  if (pct === 100) return 'var(--green)';
  if (pct >= 60)   return 'var(--blue)';
  if (pct >= 25)   return 'var(--yellow)';
  return pct > 0   ? 'var(--red)' : 'var(--border2)';
}

function statusPill(status) {

    upcoming:  `<span class="pill pill-gray">○ Upcoming</span>`,
    active:    `<span class="pill pill-blue">〜 Active</span>`,
    completed: `<span class="pill pill-green">✓ Completed</span>`,

  return map[status] || map.upcoming;
}

function summaryCard(c) {
  const p = prog(c.id);
  const phases = [
    {l:'Databasing',      keys:['databasing']},
    {l:'Pre-Conference',  keys:['sponsorship','story','design','leadgen','campaigns','people','parties','learning']},
    {l:'During',          keys:['during']},
    {l:'Post',            keys:['post']},
  ];
  const phaseRows = phases.map(ph => {
    let t=0, d=0;
    ph.keys.forEach(k => { const sp=sprog(c.id,k); t+=sp.t; d+=sp.d; });
    const pct = t>0 ? Math.round(d/t*100) : 0;
    return `
      <div class="sc-phase">
        <div class="sc-phase-lbl">${ph.l}</div>
        <div class="sc-phase-bar"><div class="sc-phase-fill" style="width:${pct}%;background:${pctFill(pct)}"></div></div>
        <div class="sc-phase-pct" style="color:${pctFill(pct)}">${pct}%</div>
      </div>`;
  }).join('');

  const vc = vertColor(c.vertical);
  return `
    <div class="sc" onclick="go('${c.id}')" style="border-left:3px solid ${vc}">
      <div class="sc-body">
        <div class="sc-top">
          <div class="sc-name">${c.name}</div>
          <div class="sc-top-right">
            ${statusPill(c.status)}
            <span class="sc-arrow">→</span>
          </div>
        </div>
        <div class="sc-meta" style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
          ${vertTag(c.vertical)}
          ${c.dates?`<span style="font-size:11px;color:var(--text3)">${c.dates}</span>`:''}
        </div>
        <div class="sc-venue">${c.venue || 'Venue TBD'}</div>
        <div class="sc-desc">${c.description || 'No description yet.'}</div>
        <div class="sc-stats">
          <div class="sc-stat">
            <div class="sc-stat-lbl">Audience</div>
            <div class="sc-stat-val">${c.audienceCount || '—'}</div>
          </div>
          <div class="sc-stat">
            <div class="sc-stat-lbl">ICP</div>
            <div class="sc-stat-val">${(c.icpCount||'—').split(' ')[0]}</div>
          </div>
          <div class="sc-stat">
            <div class="sc-stat-lbl">Team</div>
            <div class="sc-stat-val">${(c.team||[]).length || '—'}</div>
          </div>
          <div class="sc-stat">
            <div class="sc-stat-lbl">Done</div>
            <div class="sc-stat-val">${p.pct}%</div>
          </div>
        </div>
        <div class="sc-phases">${phaseRows}</div>
      </div>
      <div class="sc-footer" style="border-top:1px solid ${vc}22;background:${vc}08">
        <span class="sc-footer-lbl">Tasks: ${p.d} / ${p.t} completed</span>
        <span class="sc-footer-val" style="color:${vc}">${p.pct}% overall</span>
      </div>
    </div>`;
}

function showMyTasks() {
  S.active=null; S.page='mytasks'; save(); renderSidebar();
  document.getElementById('search-row-wrap').innerHTML='';

  const name = myName();
  const u = AUTH.currentUser;
  const displayName = name || (u && u.displayName) || 'You';

  // Collect all tasks assigned to this user across all conferences
  const rows = [];
  S.confs.forEach(c => {
    Object.values(SEC).forEach(sec => {
      const hidden  = S.tasks[c.id]?.[sec.key]?._hidden || [];
      const custom  = S.tasks[c.id]?.[sec.key]?._custom || [];
      const allT    = [...sec.tasks.filter(t=>!hidden.includes(t.id)), ...custom];
      allT.forEach(task => {
        const t = tget(c.id, sec.key, task.id);
        const renames = S.tasks[c.id]?.[sec.key]?._renames || {};
        const title = renames[task.id] || task.title;
        if (t.owner === name || (!name && t.owner === (u&&u.displayName))) {
          rows.push({c, sec, task:{...task,title}, t});
        }
      });
    });
  });

  // Group by conference
  const byConf = {};
  rows.forEach(r => {
    if (!byConf[r.c.id]) byConf[r.c.id] = {c:r.c, items:[]};
    byConf[r.c.id].items.push(r);
  });

  const sc = s => ({todo:'color:var(--text3)',in_progress:'color:var(--yellow)',blocked:'color:var(--red)',done:'color:var(--green)'}[s]||'');
  const statusLabel = s => ({todo:'To Do',in_progress:'In Progress',blocked:'Blocked',done:'Done'}[s]||'To Do');

  const confCards = Object.values(byConf).map(({c,items}) => `
    <div style="background:#fff;border:1px solid var(--border);border-radius:14px;margin-bottom:16px;overflow:hidden">
      <div style="padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px">
        <div style="width:10px;height:10px;border-radius:50%;background:${vertColor(c.vertical)};flex-shrink:0"></div>
        <span style="font-weight:600;font-size:15px">${c.name}</span>
        <span style="font-size:12px;color:var(--text3);margin-left:auto">${items.length} task${items.length!==1?'s':''}</span>
      </div>
      ${items.map(({sec,task,t}) => `
        <div style="padding:11px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px">
          <div class="ti-cb${t.checked?' done':''}" onclick="chk('${c.id}','${sec.key}','${task.id}');showMyTasks()" style="flex-shrink:0"></div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:500;${t.checked?'text-decoration:line-through;color:var(--text3)':''}">${task.title}</div>
            <div style="font-size:11px;color:var(--text3);margin-top:2px">${sec.title}</div>
          </div>
          <span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--gray-bg);${sc(t.status)}">${statusLabel(t.status)}</span>
          <button style="font-size:11px;color:var(--blue);background:none;border:none;cursor:pointer;padding:2px 6px" onclick="go('${c.id}')">View →</button>
        </div>`).join('')}
    </div>`).join('');

  const empty = rows.length === 0
    ? `<div style="text-align:center;padding:60px 20px;color:var(--text3)">
         <div style="font-size:32px;margin-bottom:12px">✓</div>
         <div style="font-size:15px;font-weight:500">No tasks assigned to ${displayName} yet</div>
         <div style="font-size:13px;margin-top:6px">Tasks assigned to you will appear here</div>
       </div>`
    : '';

  document.getElementById('page-header').innerHTML = `
    <div class="page-hdr">
      <div>
        <div class="page-title">My Tasks</div>
        <div class="page-sub">${rows.length} task${rows.length!==1?'s':''} assigned to ${displayName}</div>
      </div>
    </div>`;

  document.getElementById('main-content').innerHTML = empty || confCards;
}

  S.tab=k; save();
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['overview','databasing','pre','during','post'][i]===k));
  renderTab();
}

function renderTab() {
  const c=conf(S.active); if(!c)return;
  const el=document.getElementById('main-content'); if(!el)return;
  if (S.tab==='overview') { renderOverview(c,el); return; }
  const keys=TAB_KEYS[S.tab]||[];
  el.innerHTML=keys.map(k=>renderSection(c.id,k)).join('');
}

// ── SECTIONS ─────────────────────────────────────
function renderSection(cid, key) {
  const sec=SEC[key], sp=sprog(cid,key);
  const hidden  = (S.tasks[cid]?.[key]?._hidden  || []);
  const custom  = (S.tasks[cid]?.[key]?._custom  || []);
  const order   = (S.tasks[cid]?.[key]?._order   || []);
  let allTasks  = [
    ...sec.tasks.filter(t=>!hidden.includes(t.id)).map(t=>({...t,_isCustom:false})),
    ...custom.map(t=>({...t,_isCustom:true}))
  ];
  if (order.length) {
    allTasks.sort((a,b)=>{
      const ai=order.indexOf(a.id), bi=order.indexOf(b.id);
      if(ai===-1&&bi===-1) return 0;
      if(ai===-1) return 1;
      if(bi===-1) return -1;
      return ai-bi;
    });
  }
  return `
    <div class="task-sec collapsed" id="sec-${key}">
      <div class="ts-hdr" onclick="tog('${key}')">
        <div class="ts-icon ${sec.color}">${sec.icon}</div>
        <div class="ts-title">${sec.title}</div>
        <span class="ts-pill">${sp.d}/${sp.t}</span>
        <div class="ts-arrow">▼</div>
      </div>
      <div class="ts-body" id="tsb-${cid}-${key}">
        ${allTasks.map(t=>renderTask(cid,key,t,t._isCustom)).join('')}
        <div class="ts-add-row">
          <button class="ts-add-btn" onclick="addCustomTask('${cid}','${key}')">+ Add task</button>
        </div>
      </div>
    </div>`;
}

function renderTask(cid, key, task, isCustom) {
  const t=tget(cid,key,task.id);
  const sc=taskStatusPill(t.status);
  const v=(t.value||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');
  const renames = S.tasks[cid]?.[key]?._renames || {};
  const displayTitle = renames[task.id] || task.title;
  return `
    <div class="ti" draggable="true"
      ondragstart="onDragStart(event,'${cid}','${key}','${task.id}')"
      ondragover="onDragOver(event,'${cid}','${key}','${task.id}')"
      ondragleave="onDragLeave(event)"
      ondrop="onDrop(event,'${cid}','${key}','${task.id}')"
      ondragend="onDragEnd(event)">
      <div class="ti-drag" title="Drag to reorder">⠿</div>
      <div class="ti-cb${t.checked?' done':''}" onclick="chk('${cid}','${key}','${task.id}')"></div>
      <div class="ti-body">
        <div class="ti-title${t.checked?' struck':''}">${displayTitle}</div>
        <div class="ti-inp">
          ${task.big
            ? `<textarea placeholder="${task.ph||'Notes...'}" oninput="setv('${cid}','${key}','${task.id}',this.value)">${v}</textarea>`
            : `<input type="text" placeholder="${task.ph||'Notes...'}" value="${v}" oninput="setv('${cid}','${key}','${task.id}',this.value)">`}
        </div>
        <div class="ti-meta">
          <span class="ti-meta-lbl">Owner</span>
          <select class="sel" onchange="setown('${cid}','${key}','${task.id}',this.value)">
            <option value="Unassigned"${!t.owner||t.owner==='Unassigned'?' selected':''}>Unassigned</option>
            ${[...S.members].sort((a,b)=>a.name.localeCompare(b.name)).map(m=>`<option value="${m.name}"${t.owner===m.name?' selected':''}>${m.name}</option>`).join('')}
            <option value="__add__">+ Add person…</option>
          </select>
          <select class="sel" style="${sc}" onchange="setstatus('${cid}','${key}','${task.id}',this.value)">
            <option value="todo"        ${t.status==='todo'?'selected':''}        >To Do</option>
            <option value="in_progress" ${t.status==='in_progress'?'selected':''} >In Progress</option>
            <option value="blocked"     ${t.status==='blocked'?'selected':''}     >Blocked</option>
            <option value="done"        ${t.status==='done'?'selected':''}        >Done</option>
          </select>
        </div>
      </div>
      <div class="ti-actions">
        <button class="ti-act-btn" onclick="renameTask('${cid}','${key}','${task.id}')">✏ Rename</button>
        <button class="ti-act-btn del" onclick="removeTask('${cid}','${key}','${task.id}',${isCustom})">✕ Remove</button>
      </div>
    </div>`;
}

// ════════════════════════════════════════════════
//  HANDLERS
// ════════════════════════════════════════════════
function chk(cid,key,tid) {
  const cur=tget(cid,key,tid),next=!cur.checked;
  tset(cid,key,tid,{checked:next,status:next?'done':'todo'});
  renderSidebar(); renderTab();
}
function setv(cid,key,tid,v) { tset(cid,key,tid,{value:v}); }
function setstatus(cid,key,tid,s) { tset(cid,key,tid,{status:s,checked:s==='done'}); renderSidebar(); }
function setown(cid,key,tid,o) {
  if (o==='__add__') {
    const n=(prompt('Name:')||'').trim();
    if(!n) return;
    const e=(prompt('Email (optional):')||'').trim();
    if(!S.members.some(m=>m.name===n)) { S.members.push({name:n,email:e}); save(); }
    tset(cid,key,tid,{owner:n}); renderTab();
    return;
  }
  tset(cid,key,tid,{owner:o});
}
function tog(key) { document.getElementById('sec-'+key)?.classList.toggle('collapsed'); }

function _secMeta(cid,key) {
  if(!S.tasks[cid]) S.tasks[cid]={};
  if(!S.tasks[cid][key]) S.tasks[cid][key]={};
  return S.tasks[cid][key];
}
function addCustomTask(cid,key) {
  const title=(prompt('Task name:') || '').trim();
  if(!title) return;
  const m=_secMeta(cid,key);
  if(!m._custom) m._custom=[];
  m._custom.push({id:'cust_'+Date.now(), title});
  save(); renderTab();
}
function renameTask(cid,key,tid) {
  const m=_secMeta(cid,key);
  const current=(m._renames||{})[tid] || SEC[key]?.tasks.find(t=>t.id===tid)?.title || (m._custom||[]).find(t=>t.id===tid)?.title || '';
  const next=(prompt('New task name:', current)||'').trim();
  if(!next||next===current) return;
  if(!m._renames) m._renames={};
  m._renames[tid]=next;
  // Also update the stored custom task title so it shows consistently
  if(m._custom) { const ct=m._custom.find(t=>t.id===tid); if(ct) ct.title=next; }
  save(); renderTab();
}
function removeTask(cid,key,tid,isCustom) {
  if(!confirm('Remove this task?')) return;
  const m=_secMeta(cid,key);
  if(isCustom) {
    m._custom=(m._custom||[]).filter(t=>t.id!==tid);
    delete (m._renames||{})[tid];
    if(m[tid]) delete m[tid];
  } else {
    if(!m._hidden) m._hidden=[];
    if(!m._hidden.includes(tid)) m._hidden.push(tid);
  }
  save(); renderTab();
}

// ── DRAG-TO-REORDER ─────────────────────────────
let _drag = null;
function _allTaskIds(cid,key) {
  const hidden=S.tasks[cid]?.[key]?._hidden||[];
  const custom=S.tasks[cid]?.[key]?._custom||[];
  const order=S.tasks[cid]?.[key]?._order||[];
  let ids=[...SEC[key].tasks.filter(t=>!hidden.includes(t.id)).map(t=>t.id),...custom.map(t=>t.id)];
  if(order.length) ids.sort((a,b)=>{const ai=order.indexOf(a),bi=order.indexOf(b);if(ai===-1&&bi===-1)return 0;if(ai===-1)return 1;if(bi===-1)return -1;return ai-bi;});
  return ids;
}
function onDragStart(e,cid,key,tid) {
  _drag={cid,key,tid};
  e.dataTransfer.effectAllowed='move';
  setTimeout(()=>e.target.classList.add('dragging'),0);
}
function onDragOver(e,cid,key,tid) {
  if(!_drag||_drag.cid!==cid||_drag.key!==key||_drag.tid===tid) return;
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  e.currentTarget.classList.add('drag-over');
}
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function onDragEnd(e)   { e.target.classList.remove('dragging'); _drag=null; document.querySelectorAll('.ti').forEach(el=>el.classList.remove('drag-over')); }
function onDrop(e,cid,key,tid) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(!_drag||_drag.cid!==cid||_drag.key!==key||_drag.tid===tid) return;
  const ids=_allTaskIds(cid,key);
  const si=ids.indexOf(_drag.tid), ti=ids.indexOf(tid);
  if(si===-1||ti===-1) return;
  ids.splice(si,1); ids.splice(ti,0,_drag.tid);
  _secMeta(cid,key)._order=ids;
  save(); renderTab();
}

function updC(cid,field,val) { const c=conf(cid);if(c){c[field]=val;save();renderSidebar();if(field==='status')renderDetail();} }
function rmTeam(cid,i) { const c=conf(cid);if(!c?.team)return;c.team.splice(i,1);save();const el=document.getElementById('tgrid');if(el)el.innerHTML=teamHtml(c); }
function esc(s) { return (s||'').replace(/"/g,'&quot;'); }

// ════════════════════════════════════════════════
//  MODALS
// ════════════════════════════════════════════════
function modal(html) { document.getElementById('mroot').innerHTML=`<div class="m-overlay" onclick="closeM(event)">${html}</div>`; }
function closeM(e)   { if(e&&e.target!==e.currentTarget)return;document.getElementById('mroot').innerHTML=''; }
function closeModal(){ document.getElementById('mroot').innerHTML=''; }

function openAddModal() {
  modal(`
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">Add Conference</div>
      <div class="mf"><label>Conference Name *</label><input id="an" type="text" placeholder="e.g. ASCO 2025"></div>
      <div class="mf"><label>Vertical</label>
        <select id="av">${VERTICALS.map(v=>`<option value="${v}">${v}</option>`).join('')}</select>
      </div>
      <div class="mf"><label>Website URL</label><input id="au" type="url" placeholder="https://conference.com"></div>
      <div class="mf"><label>Dates</label><input id="ad" type="text" placeholder="e.g. June 2–5, 2025"></div>
      <div class="m-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-blue" onclick="addConf()">Add Conference →</button>
      </div>
    </div>`);
}

function addConf() {
  const name=(document.getElementById('an').value||'').trim();
  if(!name){toast('Name required','err');return;}
  const id=name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  if(conf(id)){toast('Already exists','err');return;}
  const c=blank({id,name,vertical:document.getElementById('av').value,status:'upcoming',
    url:document.getElementById('au').value,dates:document.getElementById('ad').value});
  S.confs.push(c);S.tasks[id]={};save();closeModal();renderSidebar();
  toast(`${name} added`,'ok');go(id);
}

function openEditModal(cid) {
  const c=conf(cid);if(!c)return;
  modal(`
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">Edit ${c.name}</div>
      <div class="mf"><label>Name</label><input id="en" type="text" value="${esc(c.name)}"></div>
      <div class="mf"><label>Vertical</label>
        <select id="ev">${VERTICALS.map(v=>`<option value="${v}"${c.vertical===v?' selected':''}>${v}</option>`).join('')}</select>
      </div>
      <div class="mf"><label>Status</label>
        <select id="es">
          <option value="upcoming"  ${c.status==='upcoming'?'selected':''}>Upcoming</option>
          <option value="active"    ${c.status==='active'?'selected':''}>Active</option>
          <option value="completed" ${c.status==='completed'?'selected':''}>Completed</option>
        </select>
      </div>
      <div class="m-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-red" onclick="delConf('${cid}')">Delete</button>
        <button class="btn btn-blue" onclick="saveEdit('${cid}')">Save →</button>
      </div>
    </div>`);
}

function saveEdit(cid) {
  const c=conf(cid);if(!c)return;
  c.name=(document.getElementById('en').value||'').trim()||c.name;
  c.vertical=document.getElementById('ev').value;
  c.status=document.getElementById('es').value;
  save();closeModal();renderSidebar();renderDetail();toast('Saved','ok');
}

function delConf(cid) {
  if(!confirm('Delete this conference?'))return;
  S.confs=S.confs.filter(c=>c.id!==cid);delete S.tasks[cid];
  save();closeModal();dashboard();toast('Deleted','ok');
}

function openFetch(cid) {
  const c=conf(cid);if(!c)return;
  modal(`
    <div class="modal modal-lg" onclick="event.stopPropagation()">
      <div class="modal-title">Fetch Conference Details</div>
      <p style="font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.6">
        Enter the conference website URL to auto-pull details. If blocked by CORS, enter details manually below.
      </p>
      <div class="mf"><label>Conference Website URL</label>
        <input id="fu" type="url" value="${esc(c.url)}" placeholder="https://conference-website.com">
      </div>
      <div id="fr"></div>
      <div class="m-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-blue" onclick="doFetch('${cid}')">Fetch Details →</button>
      </div>
    </div>`);
}

async function doFetch(cid) {
  const url=(document.getElementById('fu').value||'').trim();
  if(!url){toast('Enter a URL','err');return;}
  const c=conf(cid);c.url=url;save();
  const fr=document.getElementById('fr');
  fr.innerHTML=`<div style="font-size:13px;color:var(--text3);padding:12px;background:var(--bg);border-radius:8px;margin-top:10px">Fetching...</div>`;
  let title=c.name,dates=c.dates||'',venue=c.venue||'',description=c.description||'';
  try {
    const r=await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
    const d=await r.json();
    const h=d.contents||'';
    const tm=h.match(/<title[^>]*>([^<]{2,80})<\/title>/i);
    if(tm) title=tm[1].replace(/\s*[-|–·].*$/,'').trim();
    const dm=h.match(/\b(?:jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:tember)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)\w*\s+\d{1,2}(?:\s*[-–]\s*\d{1,2})?(?:,?\s*\d{4})/i);
    if(dm) dates=dm[0];
  } catch(e){}
  fr.innerHTML=`
    <div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:16px;margin-top:12px">
      <div style="font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--blue);margin-bottom:14px">Review & Apply Details</div>
      <div class="mf"><label>Event Name</label><input id="ft" type="text" value="${esc(title)}"></div>
      <div class="mf"><label>Dates</label><input id="fd" type="text" value="${esc(dates)}" placeholder="e.g. April 14–16, 2025"></div>
      <div class="mf"><label>Venue</label><input id="fv" type="text" value="${esc(venue)}" placeholder="Paste venue from website"></div>
      <div class="mf"><label>Description</label><textarea id="fdesc" placeholder="Paste description...">${description}</textarea></div>
      <button class="btn btn-blue" style="width:100%" onclick="applyFetch('${cid}')">Apply Details →</button>
    </div>`;
}

function applyFetch(cid) {
  const c=conf(cid);if(!c)return;
  const t=document.getElementById('ft'),d=document.getElementById('fd'),
        v=document.getElementById('fv'),desc=document.getElementById('fdesc');
  if(t?.value.trim()) c.name=t.value.trim();
  if(d?.value.trim()) c.dates=d.value.trim();
  if(v?.value.trim()) c.venue=v.value.trim();
  if(desc?.value.trim()) c.description=desc.value.trim();
  save();closeModal();renderSidebar();renderDetail();toast('Details updated','ok');
}

function openTeam(cid) {
  modal(`
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">Add Team Member</div>
      <div class="mf"><label>Name *</label><input id="tn" type="text" placeholder="Full name"></div>
      <div class="mf"><label>Role at Conference</label><input id="tr" type="text" placeholder="e.g. Booth Lead, Demo, Business Dev"></div>
      <div class="m-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-blue" onclick="addTeam('${cid}')">Add →</button>
      </div>
    </div>`);
}

function addTeam(cid) {
  const c=conf(cid);if(!c)return;
  const name=(document.getElementById('tn').value||'').trim();
  const role=(document.getElementById('tr').value||'').trim();
  if(!name){toast('Name required','err');return;}
  if(!c.team)c.team=[];
  c.team.push({name,role});
  if(!S.members.some(m=>m.name===name))S.members.push({name,email:''});
  save();closeModal();
  const el=document.getElementById('tgrid');if(el)el.innerHTML=teamHtml(c);
}

// ════════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════════
function toast(msg,type='ok') {
  const w=document.getElementById('toasts');
  const el=document.createElement('div');
  el.className=`toast toast-${type}`;
  el.innerHTML=`${type==='ok'?'✓':'⚠'} ${msg}`;
  w.appendChild(el);
  setTimeout(()=>el.remove(),2600);
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
